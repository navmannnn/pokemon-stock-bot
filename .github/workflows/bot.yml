name: Run Pokemon Bot

on:
  schedule:
    # Runs on off-peak minutes to avoid server rush hour queues
    - cron: '5,10,20,30,40,50 * * * *'
  workflow_dispatch:

# FIXES EXIT CODE 128: Explicitly grants the bot permission to save its memory file
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      # FIXES WARNING: Forces the runner to use the updated Node.js 24 environment
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests cloudscraper

      - name: Run the Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py

      - name: Commit Memory State
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_items.txt || echo "No changes"
          git commit -m "Update inventory history" || echo "Nothing to commit"
          git push
